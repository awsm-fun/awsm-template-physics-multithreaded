# Base cfgs for the wasm target so rust-analyzer / `cargo check` are happy.
#
# NOTE: the THREADED build (Taskfile.yml) sets a full RUSTFLAGS via env, which
# *replaces* (does not append to) these. The Taskfile therefore repeats these
# two cfgs verbatim on top of the +atomics/shared-memory link args. Keep them
# in sync.
[target.wasm32-unknown-unknown]
rustflags = [
    "--cfg=web_sys_unstable_apis",
    "--cfg=getrandom_backend=\"wasm_js\"",
]

# awsm-renderer (0.21+) pulls in the `meshopt` crate, which compiles the official
# meshoptimizer C++ library via `cc`. Apple clang has no WebAssembly backend
# ("no available targets are compatible with triple wasm32-unknown-unknown"), so
# point cc at Homebrew LLVM for this target only. Requires `brew install llvm`
# (any recent version). On Linux the system clang has a wasm backend — set these
# to /usr/bin/clang, /usr/bin/clang++, /usr/bin/llvm-ar (or override via the
# CC_wasm32-unknown-unknown / CXX_… / AR_… environment variables).
[env]
CC_wasm32-unknown-unknown = "/opt/homebrew/opt/llvm/bin/clang"
CXX_wasm32-unknown-unknown = "/opt/homebrew/opt/llvm/bin/clang++"
AR_wasm32-unknown-unknown = "/opt/homebrew/opt/llvm/bin/llvm-ar"

# Mirror the cfg on native targets so editor tooling doesn't error out.
[target.'cfg(not(target_arch = "wasm32"))']
rustflags = ["--cfg=web_sys_unstable_apis"]
