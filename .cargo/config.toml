# Base cfgs for the wasm target so rust-analyzer / `cargo check` are happy.
#
# NOTE: the THREADED build (Taskfile.yml) sets a full RUSTFLAGS via env, which
# *replaces* (does not append to) these. The Taskfile therefore repeats these
# two cfgs verbatim on top of the +atomics/shared-memory link args. Keep them
# in sync.
[target.wasm32-unknown-unknown]
rustflags = [
    "--cfg=web_sys_unstable_apis",
    "--cfg=getrandom_backend=\"wasm_js\"",
]

# The `meshopt` crate (pulled in transitively by awsm-renderer 0.21+) compiles
# the meshoptimizer C++ library to wasm via the `cc` crate. Apple's system clang
# has NO wasm backend ("no available targets are compatible with triple
# wasm32-unknown-unknown"), so on macOS `cc` must be pointed at a real LLVM.
#
# --- What these two entries are ---------------------------------------------
# A macOS FALLBACK, hardcoding the Homebrew LLVM path (`brew install llvm`).
# Adjust it if your LLVM lives elsewhere (e.g. Intel-mac Homebrew is under
# /usr/local; Linux is normally /usr). `cc` finds the matching `llvm-ar`
# archiver sitting next to the compiler on its own, so there's nothing else to
# set here.
#
# --- Why it's only a fallback (and why CI doesn't break on this Mac path) ----
# You normally build through `task` (trunk and CI do), and its `env:` block in
# Taskfile.yml exports a RESOLVED, portable CC/CXX that OVERRIDES the values
# here — an exported environment variable wins over a cargo config `[env]`
# value. That's how Linux/CI uses its own stock wasm-capable clang and never
# touches this macOS path. These entries matter only for builds that BYPASS
# `task`: a bare `cargo check`, or rust-analyzer in your editor.
#
# On a non-macOS machine building WITHOUT `task`, set CC_wasm32-unknown-unknown /
# CXX_wasm32-unknown-unknown yourself (or just build through `task`).
[env]
CC_wasm32-unknown-unknown = "/opt/homebrew/opt/llvm/bin/clang"
CXX_wasm32-unknown-unknown = "/opt/homebrew/opt/llvm/bin/clang++"

# Mirror the cfg on native targets so editor tooling doesn't error out.
[target.'cfg(not(target_arch = "wasm32"))']
rustflags = ["--cfg=web_sys_unstable_apis"]
