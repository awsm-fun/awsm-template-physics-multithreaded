[package]
name = "single-player-game-physics"
description = "Template: play an awsm-scene export with awsm-renderer, across three wasm threads (DOM/input · Box3D physics · renderer) + a physics task pool, over shared memory."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
# `cdylib` is what Trunk/wasm-bindgen consume; `rlib` keeps it unit-testable.
crate-type = ["cdylib", "rlib"]

[dependencies]
# ── The renderer + the player-bundle loader ──────────────────────────────────
awsm-renderer.workspace = true
awsm-renderer-core.workspace = true
awsm-renderer-scene.workspace = true
awsm-renderer-scene-loader.workspace = true

# ── Physics ──────────────────────────────────────────────────────────────────
# Box3D (Erin Catto's C physics engine, vendored at vendor/box3d) compiled by
# packages/box3d-sys INTO THIS SAME wasm module — one shared memory, no bridge.
# See BOX3D.md for the port architecture (task pool, libc shim, SIMD).
box3d-sys.workspace = true

# ── Audio (awsm-audio runtime) ───────────────────────────────────────────────
# The `.wav` bounces in the export are unused at runtime — these SFX are
# synthesized live, so the only asset fetched is the roll worklet's `.wasm`
# (built from packages/audio-worklet-roll via the awsm-audio editor toolchain).
awsm-audio-player.workspace = true
awsm-audio-schema.workspace = true
toml.workspace = true

# ── DOM, driven from pure Rust ───────────────────────────────────────────────
dominator.workspace = true
futures.workspace = true
futures-signals.workspace = true

# ── glue ─────────────────────────────────────────────────────────────────────
glam.workspace = true
gloo-net.workspace = true
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
js-sys.workspace = true
serde.workspace = true
serde-wasm-bindgen.workspace = true
tracing.workspace = true
tracing-web.workspace = true
tracing-subscriber.workspace = true

[dependencies.web-sys]
workspace = true
features = [
    "console",
    "Window",
    "Document",
    "Event",
    "EventTarget",
    "Element",
    "HtmlElement",
    "HtmlCanvasElement",
    "HtmlInputElement",
    "OffscreenCanvas",
    "Location",
    "UrlSearchParams",
    # Resolution-scale UI (the fill-rate slider): a persisted preference
    # (Storage), a touch-device default (MediaQueryList), and the GPU facts the
    # render worker reports so main can seed the scale + cap the backing store.
    "Storage",
    "MediaQueryList",
    "Gpu",
    "GpuAdapter",
    "GpuAdapterInfo",
    "GpuSupportedLimits",
    "Navigator",
    "WorkerNavigator",
    "WorkerGlobalScope",
    "DedicatedWorkerGlobalScope",
    "Worker",
    "WorkerOptions",
    "WorkerType",
    "MessageEvent",
    "ErrorEvent",
    "Blob",
    "BlobPropertyBag",
    "Url",
    "KeyboardEvent",
    "MouseEvent",
    "ResizeObserver",
    "ResizeObserverEntry",
    "DomRectReadOnly",
    "PointerEvent",
    "WheelEvent",
    "Performance",
    "RequestCache",
]
