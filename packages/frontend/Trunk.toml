# Trunk builds the frontend from THIS directory (the Taskfile runs trunk with
# `dir: packages/frontend`); dist stays at the repo root so the deploy
# workflow and `task clean` keep their paths.
[build]
dist = "../../dist"

# Watch ONLY the frontend. media/ is deliberately NOT watched: an editor
# export writes 10+ files into media/bundle and a watched media/ turned every
# export into a rebuild/reload storm (whose mid-write reloads also poisoned
# the browser HTTP cache with half-written assets). In dev, live media comes
# from the separate `media-dev` http-server instead (Taskfile) — open
# `http://localhost:9000/?media=http://127.0.0.1:9001`. The copy-dir'd media
# in dist refreshes on the next (re)build, which is all a deploy needs.
[watch]
watch = ["."]

# The COOP/COEP headers are REQUIRED: without them `crossOriginIsolated` is
# false and `SharedArrayBuffer` (hence shared wasm memory / wasm threads) is
# unavailable. Any production host serving this build must send the same two.
[serve]
port = 9000
headers = { "Cross-Origin-Opener-Policy" = "same-origin", "Cross-Origin-Embedder-Policy" = "require-corp" }
